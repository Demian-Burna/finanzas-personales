<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" role="img">
  <title>Finanzas Personales — ícono</title>
  <desc>Ícono de Finanzas Personales — gráfico ascendente en azul</desc>

  <!-- Fondo cuadrado redondeado azul -->
  <rect x="0" y="0" width="64" height="64" rx="14" fill="#1a6bff"/>

  <!-- Línea base sutil -->
  <line x1="13" y1="49" x2="51" y2="49" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Gráfico de tendencia ascendente -->
  <polyline
    points="14,44 24,36 34,38 44,26 52,18"
    fill="none"
    stroke="white"
    stroke-width="2.5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Puntos en la línea -->
  <circle cx="14" cy="44" r="2.5" fill="white"/>
  <circle cx="34" cy="38" r="2.5" fill="white"/>
  <circle cx="44" cy="26" r="2.5" fill="white"/>
  <circle cx="52" cy="18" r="2.5" fill="white"/>
</svg>
